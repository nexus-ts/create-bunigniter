name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install

  test-scaffold:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Scaffold and verify
        run: |
          # create-bunigniter creates dir, installs bunigniter, then runs bi init --yes
          cd /tmp
          rm -rf test-scaffold-app
          bun run "$GITHUB_WORKSPACE/src/index.ts" test-scaffold-app --yes
          cd test-scaffold-app
          for f in \
            package.json config/app.ts routes/index.ts \
            routes/api.ts views/_layout.html views/welcome.html \
            dev.ts tsconfig.json .gitignore .env.example; do
            test -f "$f" && echo "✓ $f" || { echo "Missing: $f"; exit 1; }
          done
          echo "✅ All scaffold files verified"
          test -d node_modules && echo "✓ node_modules installed" \
            || { echo "Missing: node_modules"; exit 1; }
